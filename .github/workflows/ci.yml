name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Validate cpp-style-enforcer-codex
        working-directory: plugins/cpp-style-enforcer-codex
        run: npm test

      - name: Validate codemap-boost-codex
        working-directory: plugins/codemap-boost-codex
        run: npm test
